<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Creative Timeline</h1>
    </header>
    <main>
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-content">
                    <h2>Milestone 1</h2>
                    <p>Description for milestone 1.</p>
                </div>
                <div class="timeline-border">
                    <svg> <!-- Full SVG data for top border -->
                        <rect width="100%" height="10" fill="#ccc" />
                    </svg>
                </div>
            </div>
            <div class="timeline-item">
                <div class="timeline-content">
                    <h2>Milestone 2</h2>
                    <p>Description for milestone 2.</p>
                </div>
                <div class="timeline-border">
                    <svg> <!-- Full SVG data for bottom border (GPU/microchip) -->
                        <rect width="100%" height="10" fill="#ccc" />
                    </svg>
                </div>
            </div>
            <!-- Continue adding milestone items here -->
        </div>
        <button id="addMilestone">Add Milestone</button>
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModal">&times;</span>
                <h2>Summary</h2>
                <p>From internships to ventures, each phase builds on the strengths and values that define who you are.</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
